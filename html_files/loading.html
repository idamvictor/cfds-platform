<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>1 Trade Market</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --accent:#00dfa2;--accent-dim:rgba(0,223,162,.10);--accent-glow:rgba(0,223,162,.25);
  --bg:#07080c;--bg1:#0d0f15;--bg2:#10131a;
  --t1:#eef2f7;--t2:#8b97a8;--t3:#4a5468;
  --blue:#5b8def;--purple:#8b5cf6;--amber:#f5a623;
  --heading:'Outfit',sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --ease:cubic-bezier(.4,0,.2,1);
}
body{
  margin:0;height:100vh;width:100vw;
  background:var(--bg);
  display:flex;justify-content:center;align-items:center;
  overflow:hidden;font-family:var(--body);
  position:relative;
}

/* ── Particle Canvas ── */
#particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* ── Floating Orbs ── */
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.12;z-index:0;animation:orbFloat 22s ease-in-out infinite;}
.orb-1{width:400px;height:400px;background:var(--accent);top:-10%;left:-8%;animation-delay:0s;}
.orb-2{width:350px;height:350px;background:var(--purple);bottom:-12%;right:-6%;animation-delay:-8s;}
.orb-3{width:300px;height:300px;background:var(--blue);top:40%;left:50%;animation-delay:-15s;}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1);}
  25%{transform:translate(40px,-30px) scale(1.08);}
  50%{transform:translate(-20px,50px) scale(.95);}
  75%{transform:translate(30px,20px) scale(1.05);}
}

/* ── Main Loader Container ── */
.loader-wrap{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:0;
}

/* ═══════════════════════════════════════
   PHASE 1: SPINNING RINGS (visible first)
   ═══════════════════════════════════════ */
.ring-phase{
  position:relative;
  width:160px;height:160px;
  display:flex;align-items:center;justify-content:center;
}

/* Multiple concentric rings */
.spin-ring{
  position:absolute;border-radius:50%;
  border:2px solid transparent;
}
.spin-ring-1{
  width:160px;height:160px;
  border-top-color:rgba(0,223,162,.5);
  border-right-color:rgba(0,223,162,.15);
  animation:ringCW .7s linear infinite;
  filter:drop-shadow(0 0 8px rgba(0,223,162,.4));
}
.spin-ring-2{
  width:136px;height:136px;
  border-bottom-color:rgba(91,141,239,.45);
  border-left-color:rgba(91,141,239,.12);
  animation:ringCCW .9s linear infinite;
  filter:drop-shadow(0 0 6px rgba(91,141,239,.3));
}
.spin-ring-3{
  width:112px;height:112px;
  border-top-color:rgba(139,92,246,.4);
  border-right-color:rgba(139,92,246,.1);
  animation:ringCW 1.1s linear infinite;
  filter:drop-shadow(0 0 6px rgba(139,92,246,.25));
}
.spin-ring-4{
  width:88px;height:88px;
  border-bottom-color:rgba(0,223,162,.35);
  border-left-color:rgba(245,166,35,.15);
  animation:ringCCW .5s linear infinite;
  filter:drop-shadow(0 0 5px rgba(0,223,162,.25));
}

/* Center dot pulsing */
.ring-core{
  width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle,#00ffc3,var(--accent));
  box-shadow:0 0 20px rgba(0,223,162,.5),0 0 40px rgba(0,223,162,.2);
  animation:corePulse 1.2s ease-in-out infinite alternate;
  z-index:2;
}

@keyframes ringCW{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
@keyframes ringCCW{0%{transform:rotate(0deg);}100%{transform:rotate(-360deg);}}
@keyframes corePulse{
  0%{transform:scale(1);box-shadow:0 0 20px rgba(0,223,162,.5),0 0 40px rgba(0,223,162,.2);}
  100%{transform:scale(1.4);box-shadow:0 0 30px rgba(0,223,162,.7),0 0 60px rgba(0,223,162,.3);}
}

/* Ring phase collapse animation */
.ring-phase.collapsing .spin-ring{
  animation-duration:.3s !important;
}
.ring-phase.collapsing .spin-ring-1{animation:ringCollapse .8s var(--ease) forwards;}
.ring-phase.collapsing .spin-ring-2{animation:ringCollapse .8s var(--ease) .05s forwards;}
.ring-phase.collapsing .spin-ring-3{animation:ringCollapse .8s var(--ease) .1s forwards;}
.ring-phase.collapsing .spin-ring-4{animation:ringCollapse .8s var(--ease) .15s forwards;}
.ring-phase.collapsing .ring-core{animation:coreExpand .8s var(--ease) .2s forwards;}

@keyframes ringCollapse{
  0%{opacity:1;transform:rotate(0deg) scale(1);}
  50%{opacity:.8;transform:rotate(180deg) scale(.5);}
  100%{opacity:0;transform:rotate(360deg) scale(0);border-radius:20px;}
}
@keyframes coreExpand{
  0%{transform:scale(1);opacity:1;}
  60%{transform:scale(5);opacity:.6;}
  100%{transform:scale(0);opacity:0;}
}

/* ═══════════════════════════════════════
   PHASE 2: 7D LOGO (hidden, then revealed)
   ═══════════════════════════════════════ */
.logo-phase{
  display:flex;flex-direction:column;align-items:center;gap:0;
  opacity:0;pointer-events:none;
}
.logo-phase.revealed{
  opacity:1;pointer-events:auto;
  animation:logoPhaseIn 1s var(--ease) forwards;
}
@keyframes logoPhaseIn{
  0%{opacity:0;transform:scale(.2) rotateY(90deg);}
  40%{opacity:1;transform:scale(1.1) rotateY(-8deg);}
  70%{transform:scale(.96) rotateY(3deg);}
  100%{opacity:1;transform:scale(1) rotateY(0deg);}
}

/* Perspective Stage */
.logo-stage{
  perspective:600px;
  perspective-origin:50% 40%;
  position:relative;
}

/* 3D Rotation Container */
.logo-rotator{
  transform-style:preserve-3d;
  position:relative;
}
.logo-phase.revealed .logo-rotator{
  animation:logo7dFloat 6s ease-in-out 1s infinite;
}

/* Ground Reflection */
.logo-reflection{
  position:absolute;bottom:-62px;left:50%;
  width:110px;height:50px;transform:translateX(-50%);
  background:radial-gradient(ellipse at center,rgba(0,223,162,.18) 0%,transparent 70%);
  filter:blur(8px);pointer-events:none;
}
.logo-phase.revealed .logo-reflection{animation:reflectionPulse 6s ease-in-out 1s infinite;}

/* Volumetric Glow */
.logo-vol-glow{
  position:absolute;top:50%;left:50%;width:160px;height:160px;
  transform:translate(-50%,-50%);border-radius:50%;
  background:radial-gradient(circle,rgba(0,223,162,.25) 0%,rgba(0,223,162,.08) 40%,transparent 70%);
  pointer-events:none;z-index:-1;
}
.logo-phase.revealed .logo-vol-glow{animation:volGlow 4s ease-in-out 1s infinite alternate;}

/* The Main Logo Box */
.logo-box{
  width:96px;height:96px;
  background:linear-gradient(145deg,#00ffc3 0%,#00e8aa 25%,var(--accent) 50%,#00c78a 75%,#00b881 100%);
  border-radius:20px;
  display:flex;align-items:baseline;justify-content:center;
  flex-shrink:0;
  box-shadow:
    0 0 80px rgba(0,223,162,.3),0 0 40px rgba(0,223,162,.15),
    0 20px 60px rgba(0,0,0,.5),0 8px 25px rgba(0,0,0,.3),
    0 -1px 0 rgba(255,255,255,.15),
    inset 0 3px 1px rgba(255,255,255,.4),
    inset 0 -4px 10px rgba(0,0,0,.25),
    inset 3px 0 8px rgba(0,0,0,.08),
    inset -3px 0 8px rgba(0,0,0,.08);
  position:relative;overflow:hidden;padding-top:14px;
  transform-style:preserve-3d;
}
.logo-phase.revealed .logo-box{animation:logoPulse7d 3s ease-in-out 1s infinite;}

/* Gloss Overlay */
.logo-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:45%;
  background:linear-gradient(175deg,rgba(255,255,255,.35) 0%,rgba(255,255,255,.1) 40%,transparent 100%);
  pointer-events:none;border-radius:20px 20px 50% 50%;z-index:3;
}
/* Animated Light Sweep */
.logo-box::after{
  content:'';position:absolute;top:-50%;left:-80%;width:60%;height:200%;
  background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.2) 45%,rgba(255,255,255,.3) 50%,rgba(255,255,255,.2) 55%,transparent 70%);
  transform:rotate(25deg);pointer-events:none;z-index:4;
}
.logo-phase.revealed .logo-box::after{animation:lightSweep 4s ease-in-out .5s infinite;}

/* Holographic Rim */
.logo-rim{
  position:absolute;top:-1px;left:-1px;right:-1px;bottom:-1px;
  border-radius:21px;border:1.5px solid transparent;
  background:linear-gradient(145deg,rgba(255,255,255,.3),rgba(0,223,162,.35),rgba(91,141,239,.25),rgba(139,92,246,.25),rgba(0,223,162,.2)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  pointer-events:none;z-index:5;animation:rimShift 5s linear infinite;
}

/* Depth Faces */
.logo-depth{position:absolute;bottom:-6px;left:4px;right:4px;height:8px;background:linear-gradient(180deg,#008a62,#006b4d);border-radius:0 0 16px 16px;filter:blur(.5px);z-index:-1;}
.logo-depth-left{position:absolute;top:4px;bottom:4px;left:-4px;width:6px;background:linear-gradient(90deg,#007a58,#009e72);border-radius:16px 0 0 16px;filter:blur(.5px);z-index:-1;}
.logo-depth-right{position:absolute;top:4px;bottom:4px;right:-4px;width:5px;background:linear-gradient(270deg,#006b4d,#008a62);border-radius:0 16px 16px 0;filter:blur(.5px);z-index:-1;}

/* ── Logo Text ── */
.logo-1{
  font-family:var(--heading);font-size:2.8rem;font-weight:900;
  color:#000;line-height:1;
  text-shadow:0 1px 0 rgba(255,255,255,.35),0 2px 0 rgba(255,255,255,.15),0 3px 6px rgba(0,0,0,.15);
  position:relative;z-index:2;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.1));
}
.logo-tm{
  font-family:var(--heading);font-size:1.15rem;font-weight:800;
  color:rgba(0,0,0,.6);line-height:1;margin-left:1px;
  letter-spacing:-.02em;align-self:flex-start;margin-top:5px;
  text-shadow:0 1px 0 rgba(255,255,255,.2);
  position:relative;z-index:2;
}

/* ═══════════════════════════════════════
   GLASS GLOSSY BRIGHT BRAND TEXT
   ═══════════════════════════════════════ */
.brand-text{
  text-align:center;
  opacity:0;
  margin-top:32px;
  position:relative;
}
.brand-text.visible{
  animation:textGlassIn 1s var(--ease) forwards;
}

/* Main heading: Glass Glossy Effect */
.brand-text h1{
  font-family:var(--heading);font-size:2rem;font-weight:800;
  letter-spacing:.03em;margin:0;position:relative;
  /* Bright white with glass sheen */
  background:linear-gradient(
    175deg,
    #ffffff 0%,
    #e0fff4 15%,
    #ffffff 30%,
    rgba(0,223,162,.9) 45%,
    #ffffff 60%,
    #b8ffe6 80%,
    #ffffff 100%
  );
  background-size:200% 200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:glassTextShimmer 4s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(0,223,162,.35)) drop-shadow(0 2px 4px rgba(0,0,0,.3));
}
/* Glossy light bar sweeping across text */
.brand-text h1::after{
  content:'1 Trade Market';
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(
    105deg,
    transparent 20%,
    rgba(255,255,255,.6) 45%,
    rgba(255,255,255,.8) 50%,
    rgba(255,255,255,.6) 55%,
    transparent 80%
  );
  background-size:200% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:glossSweepText 3.5s ease-in-out 1s infinite;
  pointer-events:none;
}

.brand-text h1 em{
  font-style:normal;
  -webkit-text-fill-color:transparent;
  background:linear-gradient(
    175deg,
    #00ffc3 0%,
    var(--accent) 30%,
    #00ffb3 50%,
    #00e89a 70%,
    #00ffc3 100%
  );
  background-size:200% 200%;
  -webkit-background-clip:text;
  background-clip:text;
  animation:glassTextShimmer 4s ease-in-out infinite;
  filter:drop-shadow(0 0 8px rgba(0,223,162,.4));
}

/* Tagline: Glass bright style */
.brand-text .tagline{
  font-family:var(--body);font-size:.85rem;
  letter-spacing:.22em;text-transform:uppercase;margin-top:10px;
  font-weight:600;position:relative;
  background:linear-gradient(
    90deg,
    rgba(255,255,255,.5) 0%,
    rgba(255,255,255,.95) 20%,
    rgba(0,223,162,.8) 50%,
    rgba(255,255,255,.95) 80%,
    rgba(255,255,255,.5) 100%
  );
  background-size:200% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:taglineGlow 3s ease-in-out infinite alternate;
  filter:drop-shadow(0 0 8px rgba(0,223,162,.25));
}

/* Glass text behind (frosted backdrop) */
.brand-text::before{
  content:'';position:absolute;
  top:-12px;left:-30px;right:-30px;bottom:-12px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  backdrop-filter:blur(12px) saturate(1.2);
  -webkit-backdrop-filter:blur(12px) saturate(1.2);
  z-index:-1;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    inset 0 -1px 0 rgba(0,0,0,.1),
    0 8px 32px rgba(0,0,0,.2);
}

@keyframes glassTextShimmer{
  0%{background-position:0% 0%;}
  50%{background-position:100% 100%;}
  100%{background-position:0% 0%;}
}
@keyframes glossSweepText{
  0%,100%{background-position:200% 0;}
  50%{background-position:-100% 0;}
}
@keyframes taglineGlow{
  0%{background-position:200% 0;filter:drop-shadow(0 0 8px rgba(0,223,162,.2));}
  100%{background-position:0% 0;filter:drop-shadow(0 0 14px rgba(0,223,162,.4));}
}
@keyframes textGlassIn{
  0%{opacity:0;transform:translateY(25px);filter:blur(8px);}
  60%{opacity:1;filter:blur(0);}
  100%{opacity:1;transform:translateY(0);filter:blur(0);}
}

/* ── 7D Keyframes ── */
@keyframes logo7dFloat{
  0%,100%{transform:rotateX(0deg) rotateY(0deg) translateZ(0);}
  16%{transform:rotateX(3deg) rotateY(-4deg) translateZ(6px);}
  33%{transform:rotateX(-2deg) rotateY(3deg) translateZ(3px);}
  50%{transform:rotateX(4deg) rotateY(2deg) translateZ(8px);}
  66%{transform:rotateX(-3deg) rotateY(-3deg) translateZ(4px);}
  83%{transform:rotateX(2deg) rotateY(4deg) translateZ(6px);}
}
@keyframes logoPulse7d{
  0%,100%{box-shadow:0 0 80px rgba(0,223,162,.3),0 0 40px rgba(0,223,162,.15),0 20px 60px rgba(0,0,0,.5),0 8px 25px rgba(0,0,0,.3),0 -1px 0 rgba(255,255,255,.15),inset 0 3px 1px rgba(255,255,255,.4),inset 0 -4px 10px rgba(0,0,0,.25),inset 3px 0 8px rgba(0,0,0,.08),inset -3px 0 8px rgba(0,0,0,.08);}
  50%{box-shadow:0 0 100px rgba(0,223,162,.45),0 0 55px rgba(0,223,162,.25),0 25px 70px rgba(0,0,0,.55),0 10px 30px rgba(0,0,0,.35),0 -1px 0 rgba(255,255,255,.2),inset 0 3px 1px rgba(255,255,255,.45),inset 0 -4px 10px rgba(0,0,0,.25),inset 3px 0 8px rgba(0,0,0,.08),inset -3px 0 8px rgba(0,0,0,.08);}
}
@keyframes lightSweep{
  0%,100%{left:-80%;opacity:0;}
  10%{opacity:1;}
  50%{left:130%;opacity:1;}
  60%,100%{left:130%;opacity:0;}
}
@keyframes reflectionPulse{
  0%,100%{opacity:.5;transform:translateX(-50%) scaleX(1);}
  50%{opacity:.8;transform:translateX(-50%) scaleX(1.15);}
}
@keyframes volGlow{
  0%{opacity:.6;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}
}
@keyframes rimShift{0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(360deg);}}

/* ── Scanning Line ── */
.scan-line{
  position:fixed;top:0;left:0;width:100%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,223,162,.08),transparent);
  z-index:1;animation:scanDown 4s linear infinite;pointer-events:none;
}
@keyframes scanDown{0%{top:-2px;}100%{top:100%;}}

/* ── Corner Accents ── */
.corner{position:fixed;z-index:1;pointer-events:none;width:40px;height:40px;opacity:.15;}
.corner::before,.corner::after{content:'';position:absolute;background:var(--accent);}
.corner-tl{top:24px;left:24px;}.corner-tl::before{top:0;left:0;width:20px;height:2px;}.corner-tl::after{top:0;left:0;width:2px;height:20px;}
.corner-tr{top:24px;right:24px;}.corner-tr::before{top:0;right:0;width:20px;height:2px;}.corner-tr::after{top:0;right:0;width:2px;height:20px;}
.corner-bl{bottom:24px;left:24px;}.corner-bl::before{bottom:0;left:0;width:20px;height:2px;}.corner-bl::after{bottom:0;left:0;width:2px;height:20px;}
.corner-br{bottom:24px;right:24px;}.corner-br::before{bottom:0;right:0;width:20px;height:2px;}.corner-br::after{bottom:0;right:0;width:2px;height:20px;}

/* ── Data Fragments ── */
.data-frag{
  position:fixed;z-index:1;pointer-events:none;
  font-family:var(--mono);font-size:.6rem;
  color:rgba(0,223,162,.08);letter-spacing:.08em;
  animation:fragDrift 12s linear infinite;
}
.data-frag:nth-child(odd){animation-direction:reverse;}
@keyframes fragDrift{
  0%{transform:translateY(0) translateX(0);opacity:.06;}
  50%{opacity:.12;}
  100%{transform:translateY(-60px) translateX(20px);opacity:.04;}
}

/* ── Micro Dots ── */
.dot-grid{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:32px 32px;
}

/* ── Complete/Exit Transition ── */
.loader-wrap.complete .logo-phase{animation:logoExit .6s var(--ease) forwards;}
.loader-wrap.complete .brand-text{animation:fadeOut .4s var(--ease) .1s forwards;}
@keyframes logoExit{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.15);opacity:1;}100%{transform:scale(0);opacity:0;}}
@keyframes fadeOut{to{opacity:0;transform:translateY(-10px);}}
</style>
</head>
<body>

<!-- Background Layers -->
<canvas id="particleCanvas"></canvas>
<div class="dot-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="scan-line"></div>

<!-- Corner Brackets -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Data Fragments -->
<div class="data-frag" style="top:15%;left:8%;">0x7f3a...c2d1</div>
<div class="data-frag" style="top:72%;left:12%;">SHA256:OK</div>
<div class="data-frag" style="top:25%;right:10%;">TLS 1.3</div>
<div class="data-frag" style="top:68%;right:8%;">AES 256</div>
<div class="data-frag" style="top:45%;left:5%;">WSS://LIVE</div>
<div class="data-frag" style="top:82%;right:15%;">NODE:SYNC</div>

<!-- Main Loader -->
<div class="loader-wrap" id="loaderWrap">

  <!-- PHASE 1: Spinning Rings -->
  <div class="ring-phase" id="ringPhase">
    <div class="spin-ring spin-ring-1"></div>
    <div class="spin-ring spin-ring-2"></div>
    <div class="spin-ring spin-ring-3"></div>
    <div class="spin-ring spin-ring-4"></div>
    <div class="ring-core"></div>
  </div>

  <!-- PHASE 2: 7D Logo + Brand Text (hidden until rings collapse) -->
  <div class="logo-phase" id="logoPhase">
    <div class="logo-stage">
      <div class="logo-rotator">
        <div class="logo-vol-glow"></div>
        <div class="logo-box">
          <div class="logo-rim"></div>
          <div class="logo-depth"></div>
          <div class="logo-depth-left"></div>
          <div class="logo-depth-right"></div>
          <span class="logo-1">1</span>
          <span class="logo-tm">TM</span>
        </div>
        <div class="logo-reflection"></div>
      </div>
    </div>
    <!-- Brand Name directly below logo -->
    <div class="brand-text" id="brandText">
      <h1>1 Trade <em>Market</em></h1>
      <div class="tagline">One Click to All Markets</div>
    </div>
  </div>
</div>

<script>
/* ── Particle System ── */
(function(){
  const c=document.getElementById('particleCanvas'),ctx=c.getContext('2d');
  let W,H;
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const pts=[];
  for(let i=0;i<50;i++){
    pts.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
      r:Math.random()*1.5+.5,
      a:Math.random()*.3+.1
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach((p,i)=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,223,162,${p.a})`;ctx.fill();
      for(let j=i+1;j<pts.length;j++){
        const dx=p.x-pts[j].x,dy=p.y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(0,223,162,${.06*(1-d/120)})`;
          ctx.lineWidth=.5;ctx.stroke();
        }
      }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Phase Transition: Rings → Logo → Text ── */
(function(){
  const ringPhase=document.getElementById('ringPhase');
  const logoPhase=document.getElementById('logoPhase');
  const brandText=document.getElementById('brandText');

  /* Phase 1: Rings spin fast for 1.2 seconds then collapse */
  setTimeout(()=>{
    /* Collapse rings */
    ringPhase.classList.add('collapsing');

    /* After rings collapse, reveal logo */
    setTimeout(()=>{
      ringPhase.style.display='none';
      logoPhase.classList.add('revealed');

      /* After logo settles, reveal text */
      setTimeout(()=>{
        brandText.classList.add('visible');
      },600);

    },800);
  },1200);

  /* Auto redirect after full animation */
  setTimeout(()=>{
    document.getElementById('loaderWrap').classList.add('complete');
    setTimeout(()=>{
      /* ── Replace with your redirect ── */
      /* window.location.href = 'dashboard.html'; */
    },700);
  },5500);
})();
